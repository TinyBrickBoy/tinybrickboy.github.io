<!DOCTYPE html>
<html lang="de">
<head>

    <script>
        (function() {
            var saved = localStorage.getItem('theme');
            var dark = saved ? saved === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.classList.add(dark ? 'dark' : 'light');
        })();
    </script>
    <style>
        :root {
            --bg: #f6f7fb; --surface: #fff; --text: #0b1020; --text-2: #475569;
            --primary: #3b82f6; --accent: #a855f7; --accent-2: #ec4899;
            --border: rgba(15,23,42,0.08);
        }
        .dark {
            --bg: #070b18; --surface: #0d1326; --text: #f1f5f9; --text-2: #94a3b8;
            --border: rgba(255,255,255,0.08);
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid; place-items: center;
            text-align: center;
            padding: 2rem;
            overflow: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
        }
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
        }
        body::before {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--primary), transparent 70%);
            top: -10%; left: -10%;
        }
        body::after {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--accent), transparent 70%);
            bottom: -10%; right: -10%;
        }
        .wrap { max-width: 540px; }
        .code {
            font-size: clamp(6rem, 22vw, 12rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, var(--primary), var(--accent), var(--accent-2));
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 0.75rem;
        }
        p {
            color: var(--text-2);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.85rem 1.6rem;
            font-size: 0.92rem; font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 0.75rem;
            text-decoration: none;
            box-shadow: 0 8px 28px -8px rgba(99,102,241,0.6);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 40px -10px rgba(99,102,241,0.7); }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="code">404</div>
        <h1>Hier ist nichts.</h1>
        <p>Diese Seite gibt's nicht (mehr). Vielleicht ein Tippfehler, vielleicht ein verlorener Link.</p>
        <a href="/" class="btn">&larr; Zur Startseite</a>
    </div>
</body>
</html>
